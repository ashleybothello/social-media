version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aixmedia-db
    environment:
      POSTGRES_USER: aixmedia
      POSTGRES_PASSWORD: aixmedia_password
      POSTGRES_DB: aixmedia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
